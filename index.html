<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Sigma Tech R&D — Pre-acquisition diagnostics for second-hand laboratory instruments</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Independent on-site inspection, calibration and reporting for pre-owned laboratory instruments — auction lots, surplus, direct sale. Hong Kong SAR."/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Serif:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="responsive.css">
  <style>
    html, body { margin: 0; padding: 0; background: oklch(0.97 0.008 85); font-family: 'IBM Plex Sans', system-ui, sans-serif; color: oklch(0.18 0.02 240); }
    * { box-sizing: border-box; }
    a { color: inherit; }
    /* The MixImageLanding component sets width:1400px; we want it fluid. */
    #root > div { width: 100% !important; max-width: 1400px; margin: 0 auto; }
    /* Selection */
    ::selection { background: oklch(0.74 0.16 60); color: oklch(0.18 0.02 240); }
    /* Smooth scroll for in-page anchors */
    html { scroll-behavior: smooth; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="diagrams.jsx"></script>
  <script type="text/babel" src="mix-img-hero.jsx"></script>
  <script type="text/babel" src="variant-mix-img.jsx"></script>
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(<MixImageLanding/>);
  </script>
</body>
</html>
